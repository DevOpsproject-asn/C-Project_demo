name: Build, Test, and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mathutils

jobs:
  # ===== Build and Test Job =====
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake gcc g++ make
        gcc --version
        cmake --version
    
    - name: Create build directory
      run: mkdir -p build
    
    - name: Configure with CMake
      working-directory: build
      run: cmake ..
    
    - name: Build project with CMake
      working-directory: build
      run: cmake --build . --config Release
    
    - name: Run unit tests (CMake)
      working-directory: build
      run: ctest --output-on-failure
    
    - name: Build with Make (alternative method)
      run: make all-targets
    
    - name: Run tests with Make
      run: make test
    
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          build/bin/
          build/lib/

  # ===== Docker Build and Push Job =====
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    needs: build-and-test
    if: success()
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Test Docker image
      run: |
        docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ===== Code Quality Check Job (Optional) =====
  quality-check:
    name: Code Quality
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck
    
    - name: Run cppcheck
      run: cppcheck --enable=all --suppress=missingIncludeSystem src/ include/ --error-exitcode=1 || true
    
    - name: Check formatting (optional)
      run: |
        echo "Code quality checks completed."
        echo "Consider using clang-format for style checking in future runs."

  # ===== Summary Job =====
  summary:
    name: Build Summary
    runs-on: ubuntu-22.04
    needs: [build-and-test, docker-build, quality-check]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "================================"
        echo "Build Pipeline Completed"
        echo "================================"
        echo "Build and Test: ${{ needs.build-and-test.result }}"
        echo "Docker Build: ${{ needs.docker-build.result }}"
        echo "Quality Check: ${{ needs.quality-check.result }}"
        echo "================================"
        if [ "${{ needs.build-and-test.result }}" != "success" ]; then
          exit 1
        fi
